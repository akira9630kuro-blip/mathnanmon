<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>ファイブクレスト — 五紋の決闘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Noto+Serif+JP:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base: #1a1d27;
  --bg-panel: #232838;
  --bg-panel-raised: #2d3347;
  --bg-panel-deep: #14161f;
  --text-primary: #ece6d8;
  --text-muted: #93989f;
  --text-faint: #5c6170;
  --civ-fire: #e2542b;   --civ-fire-dark: #7a2414;
  --civ-water: #2f8fd1;  --civ-water-dark: #15426b;
  --civ-nature: #5a9c3f; --civ-nature-dark: #2a4a1f;
  --civ-light: #d9b03c;  --civ-light-dark: #6b5618;
  --civ-dark: #8b6bc4;   --civ-dark-dark: #3d2f5c;
  --spectrum: linear-gradient(90deg, var(--civ-fire), var(--civ-light) 25%, var(--civ-nature) 50%, var(--civ-water) 75%, var(--civ-dark));
  --font-display: 'Cinzel', serif;
  --font-card: 'Noto Serif JP', serif;
  --font-ui: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic Medium', 'Noto Sans JP', sans-serif;
  --r-sm: 6px; --r-md: 10px; --r-lg: 16px;
  --shadow-1: 0 2px 6px rgba(0,0,0,.45);
  --shadow-2: 0 10px 28px rgba(0,0,0,.6);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin:0; padding:0; }
body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-ui);
  min-height: 100vh;
  overscroll-behavior-y: none;
}
#app { min-height: 100vh; display:flex; flex-direction:column; }
button { font-family: inherit; }
img, svg { display:block; }
::-webkit-scrollbar { height:5px; width:5px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius:4px; }

.spectrum-bar { height: 3px; background: var(--spectrum); flex-shrink:0; }
.spectrum-bar.thick { height: 5px; }

/* ============ Buttons ============ */
.btn {
  font-family: var(--font-ui);
  font-size: 14px; font-weight:600;
  padding: 11px 22px;
  border-radius: var(--r-md);
  border: 1px solid rgba(255,255,255,.12);
  background: var(--bg-panel-raised);
  color: var(--text-primary);
  cursor:pointer;
  transition: filter .15s, transform .1s;
  white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn:hover { filter: brightness(1.18); }
.btn-primary { background: linear-gradient(135deg, #44507a, #2a2f47); border-color: rgba(255,255,255,.22); }
.btn-ghost { background: transparent; border-color: rgba(255,255,255,.18); }
.btn-danger-ghost { background: transparent; border-color: var(--civ-fire); color: var(--civ-fire); }
.btn:disabled { opacity:.32; cursor:not-allowed; filter:none; }
.btn-sm { font-size:12px; padding:7px 14px; }
.btn-block { width:100%; }

/* ============ Generic screens (start / turn intro / game over) ============ */
.screen-center {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding: 36px 20px; gap: 20px;
}
.logo-title { font-family: var(--font-display); font-size: clamp(34px,9vw,54px); letter-spacing: .07em; font-weight:700; }
.logo-sub { font-family: var(--font-card); font-size: 16px; color: var(--text-muted); letter-spacing:.08em; }
.rules-blurb { max-width: 460px; color: var(--text-muted); font-size: 13.5px; line-height:1.85; text-align:left; }
.rules-blurb b { color: var(--text-primary); }
.civ-legend { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; margin-top:4px; }
.civ-chip { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted); }
.civ-dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }

.turn-banner-name { font-family: var(--font-card); font-size: clamp(28px,7.5vw,42px); font-weight:700; }
.turn-banner-sub { color: var(--text-muted); font-size:13px; max-width:320px; line-height:1.7; }

.winner-banner { font-family: var(--font-display); font-size: clamp(26px,7vw,38px); font-weight:700; letter-spacing:.03em; }

/* ============ Board layout ============ */
.board { flex:1; display:flex; flex-direction:column; min-height:100vh; }
.player-row { padding: 10px 12px; display:flex; flex-direction:column; gap:7px; }
.player-row.opponent { padding-top: max(12px, env(safe-area-inset-top)); background: linear-gradient(to bottom, rgba(0,0,0,.18), transparent); }
.player-row.mine { padding-bottom: max(12px, env(safe-area-inset-bottom)); flex:1; display:flex; flex-direction:column; justify-content:flex-end; background: linear-gradient(to top, rgba(0,0,0,.18), transparent); }

.player-header { display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; }
.player-name-block { display:flex; align-items:center; gap:9px; }
.player-name { font-family: var(--font-card); font-weight:700; font-size:14px; }
.turn-dot { width:7px; height:7px; border-radius:50%; background: var(--civ-light); display:inline-block; margin-right:7px; box-shadow: 0 0 6px var(--civ-light); animation: dot-pulse 1.6s infinite; }
.meta-pips { display:flex; gap:10px; align-items:center; font-size:11px; color:var(--text-muted); }
.shield-pips { display:flex; gap:3px; }
.shield-pip { width:8px; height:13px; border-radius:2px; background: linear-gradient(180deg, var(--civ-light), var(--civ-light-dark)); }
.shield-pip.empty { background: transparent; border:1px solid var(--text-faint); }
.deck-count, .gy-count { display:flex; align-items:center; gap:4px; cursor:pointer; padding:2px 5px; border-radius:5px; }
.deck-count:hover, .gy-count:hover { background: rgba(255,255,255,.06); }
.deck-count svg, .gy-count svg { width:13px;height:13px; opacity:.8; }

.mana-row { display:flex; gap:4px; flex-wrap:wrap; min-height: 24px; align-items:center; }
.mana-chip {
  width:21px; height:21px; border-radius:50%; flex-shrink:0;
  border:2px solid var(--mc, #777);
  display:flex;align-items:center;justify-content:center;
  font-family: var(--font-display); font-size:9px; font-weight:700; color:var(--mc,#aaa);
  background: rgba(0,0,0,.3);
}
.mana-chip.tapped { opacity:.28; }
.empty-hint { font-size:11px; color:var(--text-faint); font-style:italic; }

.battle-zone { display:flex; gap:7px; overflow-x:auto; padding:5px 2px; min-height: 100px; align-items:flex-start; }
.empty-zone-hint { color: var(--text-faint); font-size:11px; font-style:italic; padding: 36px 6px; }

.hand-row { display:flex; gap:6px; overflow-x:auto; padding: 4px 2px 6px; }

/* ============ Card ============ */
.card {
  --cc: #888; --ccd:#333;
  width: 78px; flex-shrink:0; border-radius: var(--r-md);
  background: var(--bg-panel-raised);
  box-shadow: var(--shadow-1);
  overflow:hidden; cursor:pointer; user-select:none;
  border: 1px solid rgba(255,255,255,.08);
  transition: transform .15s ease, box-shadow .15s ease;
  position:relative;
}
.card:active { transform: scale(.96); }
.card.selectable:hover { transform: translateY(-5px); box-shadow: var(--shadow-2); }
.card.not-selectable { cursor: default; }
.card.tapped { opacity:.5; }
.card.sick { opacity:.78; }
.card.sick .card-sick-tag {
  position:absolute; bottom:0; left:0; right:0; text-align:center;
  font-size:7.5px; letter-spacing:.04em; color:#fff; background:rgba(0,0,0,.6); padding:1.5px 0;
}
.card.selected-attacker { box-shadow: 0 0 0 3px var(--civ-light), var(--shadow-2); transform: translateY(-5px); }
.card.valid-target { box-shadow: 0 0 0 3px var(--civ-fire), var(--shadow-2); animation: pulse-target 1.3s infinite; }
.card.inert { opacity:.32; pointer-events:none; }
[data-action]:focus-visible { outline: 2px solid var(--civ-light); outline-offset:2px; border-radius:4px; }
.card.lg { width: 208px; cursor:default; }
.card[data-civ="fire"]   { --cc: var(--civ-fire);   --ccd: var(--civ-fire-dark); }
.card[data-civ="water"]  { --cc: var(--civ-water);  --ccd: var(--civ-water-dark); }
.card[data-civ="nature"] { --cc: var(--civ-nature); --ccd: var(--civ-nature-dark); }
.card[data-civ="light"]  { --cc: var(--civ-light);  --ccd: var(--civ-light-dark); }
.card[data-civ="dark"]   { --cc: var(--civ-dark);   --ccd: var(--civ-dark-dark); }

.card-head {
  background: linear-gradient(160deg, var(--cc), var(--ccd));
  padding: 4px 5px 3px; display:flex; align-items:flex-start; justify-content:space-between; gap:3px;
}
.card-cost {
  width:17px;height:17px;border-radius:50%; background: rgba(0,0,0,.45); color:#fff;
  display:flex;align-items:center;justify-content:center; font-family:var(--font-display); font-size:10px; font-weight:700; flex-shrink:0;
  border: 1px solid rgba(255,255,255,.32);
}
.card.lg .card-cost { width:26px;height:26px;font-size:14px; }
.card-name { font-family: var(--font-card); font-size: 10px; font-weight:700; color:#fff; line-height:1.3; text-shadow: 0 1px 2px rgba(0,0,0,.45); }
.card.lg .card-name { font-size:16px; }
.card-art {
  height:42px; display:flex; align-items:center; justify-content:center;
  background: linear-gradient(160deg, color-mix(in srgb, var(--cc) 22%, var(--bg-panel-deep)), var(--bg-panel-deep));
}
.card.lg .card-art { height:88px; }
.card-art svg { width: 24px; height:24px; opacity:.95; }
.card.lg .card-art svg { width:46px;height:46px; }
.card-body { padding: 4px 5px 2px; min-height: 24px; }
.card-text { font-size: 8px; line-height:1.4; color: var(--text-muted); }
.card.lg .card-text { font-size:12.5px; line-height:1.6; }
.card-abilities { display:flex; gap:2px; flex-wrap:wrap; margin-bottom:2px; }
.ability-badge {
  width:13px;height:13px;border-radius:50%; background: rgba(255,255,255,.14); color:#fff;
  font-size:7.5px; display:flex;align-items:center;justify-content:center; font-family: var(--font-card); font-weight:700; flex-shrink:0;
}
.card.lg .ability-badge { width:22px;height:22px;font-size:12px; }
.card-foot { display:flex; justify-content:flex-end; align-items:center; padding: 1px 5px 4px; }
.card-power { font-family: var(--font-display); font-weight:700; font-size:11.5px; color:#fff; }
.card.lg .card-power { font-size:19px; }

.card-back { background: var(--bg-panel-deep); display:flex; align-items:center; justify-content:center; cursor:default; }
.card-back .mark { width:58%; height:3px; background: var(--spectrum); border-radius:2px; opacity:.9; }

/* ============ Center strip ============ */
.center-strip { background: var(--bg-panel); padding: 9px 12px 11px; display:flex; flex-direction:column; gap:7px; }
.turn-indicator { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.turn-text { font-family: var(--font-card); font-size: 13px; font-weight:700; }
.turn-text .n { color: var(--text-muted); font-weight:500; margin-right:6px; font-family: var(--font-ui); }
.log-feed { background: var(--bg-panel-deep); border-radius: var(--r-sm); padding: 7px 10px; font-size:11.5px; color:var(--text-muted); max-height: 58px; overflow-y:auto; line-height:1.7; }
.log-feed .latest { color: var(--text-primary); }
.log-feed div { opacity:.85; }
.log-feed div.latest { opacity:1; }

/* ============ Targeting banner ============ */
.targeting-banner {
  background: linear-gradient(135deg, var(--civ-fire-dark), #4a2418);
  border:1px solid var(--civ-fire); border-radius:var(--r-sm); padding:9px 12px;
  display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:12.5px;
}
.target-face {
  display:flex; align-items:center; justify-content:center;
  border:2px dashed var(--text-faint); border-radius:var(--r-md);
  padding: 14px 8px; margin: 0 2px; font-size:12px; color:var(--text-muted); cursor:pointer;
  transition: border-color .15s, color .15s;
}
.target-face.valid-target { border-color: var(--civ-fire); color: var(--text-primary); animation: pulse-target-bg 1.3s infinite; cursor:pointer; }

/* ============ Modal ============ */
.modal-overlay { position:fixed; inset:0; background: rgba(8,9,13,.8); display:flex; align-items:center; justify-content:center; padding:18px; z-index:50; }
.modal-box { background: var(--bg-panel); border-radius: var(--r-lg); padding: 22px; max-width: 380px; width:100%; box-shadow: var(--shadow-2); display:flex; flex-direction:column; gap:16px; max-height:88vh; overflow-y:auto; border: 1px solid rgba(255,255,255,.08); }
.modal-title { font-family: var(--font-card); font-size:15.5px; font-weight:700; text-align:center; }
.modal-card-preview { display:flex; justify-content:center; }
.modal-actions { display:flex; flex-direction:column; gap:9px; }
.modal-actions.row { flex-direction:row; }
.modal-actions .btn { width:100%; }
.target-grid { display:flex; gap:9px; flex-wrap:wrap; justify-content:center; max-height:46vh; overflow-y:auto; padding: 2px; }
.gy-list { display:flex; flex-direction:column; gap:6px; max-height: 50vh; overflow-y:auto; }
.gy-row { display:flex; align-items:center; gap:8px; font-size:13px; padding:6px 8px; border-radius:6px; background: var(--bg-panel-raised); }
.gy-row .gy-dot { width:8px;height:8px;border-radius:50%; flex-shrink:0; }

@keyframes pulse-target { 0%,100%{ box-shadow: 0 0 0 3px var(--civ-fire), var(--shadow-2);} 50%{ box-shadow: 0 0 0 6px var(--civ-fire), var(--shadow-2);} }
@keyframes pulse-target-bg { 0%,100%{ background: rgba(226,84,43,.12); } 50%{ background: rgba(226,84,43,.28);} }
@keyframes dot-pulse { 0%,100%{ opacity:1; } 50%{ opacity:.35; } }

@media (max-width: 430px) {
  .card { width: 70px; }
  .card-art { height:36px; }
  .card-art svg { width:20px;height:20px; }
  .battle-zone { min-height: 90px; }
  .card.lg { width: 180px; }
}
@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}

.waiting-banner { text-align:center; font-size:12px; color:var(--text-muted); padding:8px 12px; border-radius:var(--r-sm); background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06); animation:waiting-pulse 2s infinite; }
@keyframes waiting-pulse { 0%,100%{opacity:.7} 50%{opacity:1} }
.role-btns { display:flex; flex-direction:column; gap:12px; width:100%; max-width:320px; }

/* Deck Builder ──────────────────────────────────────── */
.db-screen{flex:1;display:flex;flex-direction:column;min-height:100vh;}
.db-header{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg-panel);flex-wrap:wrap;}
.db-count{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--text-muted);white-space:nowrap;}
.db-count.ready{color:var(--civ-nature);}
.name-inp{background:var(--bg-panel-raised);border:1px solid rgba(255,255,255,.14);border-radius:var(--r-sm);padding:6px 10px;color:var(--text-primary);font-size:13px;font-family:var(--font-card);width:130px;}
.db-toolbar{padding:8px 12px;background:var(--bg-panel-deep);display:flex;flex-direction:column;gap:6px;}
.db-filters{display:flex;gap:5px;flex-wrap:wrap;}
.flt-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.14);background:transparent;color:var(--text-muted);cursor:pointer;transition:filter .12s;}
.flt-btn:hover{filter:brightness(1.3);}
.flt-btn.active{color:#fff;border-color:var(--fc,#888);background:var(--fc,#888);}
.db-search-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.db-srch{flex:1;min-width:100px;background:var(--bg-panel-raised);border:1px solid rgba(255,255,255,.12);border-radius:var(--r-sm);padding:6px 10px;color:var(--text-primary);font-size:12px;}
.db-srch::placeholder{color:var(--text-faint);}
.db-save-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;font-size:12px;}
.deck-name-inp{background:var(--bg-panel-raised);border:1px solid rgba(255,255,255,.12);border-radius:var(--r-sm);padding:5px 8px;color:var(--text-primary);font-size:12px;width:110px;}
.db-main{flex:1;display:flex;overflow:hidden;}
.db-pool{flex:1;overflow-y:auto;padding:8px;display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;align-content:start;}
.db-sidebar{width:220px;overflow-y:auto;background:var(--bg-panel-deep);border-left:1px solid rgba(255,255,255,.06);padding:8px 0;}
.pool-wrap{position:relative;cursor:pointer;}
.pool-wrap:hover .card{transform:translateY(-4px);}
.pool-wrap.at-max{opacity:.6;}
.pool-badge{position:absolute;top:4px;right:4px;min-width:17px;height:17px;border-radius:9px;background:rgba(0,0,0,.8);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px;}
.pool-badge.maxed{background:var(--civ-dark);}
.deck-civ-hdr{font-size:10px;font-weight:700;letter-spacing:.06em;padding:8px 12px 3px;color:var(--hc,#888);}
.deck-row{display:flex;align-items:center;gap:4px;padding:4px 8px;border-bottom:1px solid rgba(255,255,255,.04);}
.deck-row-dot{width:6px;height:6px;border-radius:50%;background:var(--dc,#888);flex-shrink:0;}
.deck-row-name{flex:1;font-size:10px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.deck-row-cost{font-size:10px;font-family:var(--font-display);color:#fff;width:14px;text-align:center;}
.deck-row-cnt{font-size:11px;font-weight:700;color:var(--text-primary);min-width:18px;text-align:center;}
.ctrl-btn{width:17px;height:17px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:transparent;color:var(--text-muted);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;flex-shrink:0;}
.ctrl-btn:hover{color:#fff;background:rgba(255,255,255,.12);}
.ctrl-btn:disabled{opacity:.3;cursor:default;}
.ctrl-btn.rem:hover{color:var(--civ-fire);border-color:var(--civ-fire);}
.db-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.08);}
.db-tab{flex:1;padding:8px;background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:12px;}
.db-tab.active{color:var(--text-primary);border-bottom:2px solid var(--civ-light);}
@media(min-width:600px){.db-tabs{display:none;}.db-pool{min-height:0;}.db-sidebar{display:flex!important;flex-direction:column;}}
@media(max-width:599px){.db-main{flex-direction:column;}.db-pool.db-hidden{display:none;}.db-sidebar.db-hidden{display:none;}.db-sidebar{width:100%;border-left:none;border-top:1px solid rgba(255,255,255,.06);height:220px;}}
.wait-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:32px 20px;text-align:center;}

/* PeerJS room UI ─────────────────────────────────────── */
.room-code { font-family:var(--font-display); font-size:40px; font-weight:700;
  letter-spacing:12px; color:var(--civ-light); text-align:center;
  padding:18px 28px; background:rgba(255,255,255,.07);
  border-radius:var(--r-lg); border:1px solid rgba(255,255,255,.15); }
.code-inp { font-family:var(--font-display); font-size:28px; font-weight:700;
  letter-spacing:8px; text-align:center; text-transform:uppercase;
  background:rgba(255,255,255,.07); border:2px solid rgba(255,255,255,.18);
  border-radius:var(--r-md); color:var(--text-primary); padding:12px 24px;
  width:100%; max-width:300px; }
.code-inp:focus { outline:none; border-color:var(--civ-light); box-shadow:0 0 0 3px rgba(217,176,60,.2); }
.blink { animation:blink 1.2s step-start infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.conn-pill { display:inline-flex; align-items:center; gap:6px; padding:4px 12px;
  border-radius:20px; background:rgba(255,255,255,.06); font-size:12px; color:var(--text-muted); }
.conn-dot { width:7px; height:7px; border-radius:50%; }
.conn-dot.wait { background:var(--civ-light); animation:pulse 1.4s infinite; }
.conn-dot.ok   { background:var(--civ-nature); }
.conn-dot.err  { background:var(--civ-fire); }
</style>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
<div id="app"></div>
<script>
'use strict';

'use strict';
/* =====================================================================
   ENGINE — ported from the standalone, unit-tested engine.js module.
   Pure game-state logic, no DOM. (module.exports stripped for inline use)
   ===================================================================== */
const CIVS = {
  fire:   { name: '火',  enName: 'FIRE',   color: '#e2542b', colorDark: '#7a2414' },
  water:  { name: '水',  enName: 'WATER',  color: '#2f8fd1', colorDark: '#15426b' },
  nature: { name: '自然', enName: 'NATURE', color: '#5a9c3f', colorDark: '#2a4a1f' },
  light:  { name: '光',  enName: 'LIGHT',  color: '#d9b03c', colorDark: '#6b5618' },

function effectText(effect, isEtb) {
  if (!effect) return '';
  const p = isEtb ? '出た時、' : '';
  switch (effect.type) {
    case 'draw': return `${p}カードを${effect.value}枚引く。`;
    case 'bounce': return `${p}相手のクリーチャー1体を持ち主の手札に戻す。`;
    case 'ramp': return `${p}自分の山札の上から1枚をマナゾーンに置く。`;
    case 'addShield': return `${p}自分の山札の上から1枚をシールドゾーンに置く。`;
    case 'destroyPowerLE': return `${p}パワー${effect.value}以下の相手クリーチャー1体を破壊する。`;
    case 'regrow': return `${p}自分の墓地のクリーチャー1体を手札に戻す。`;
    case 'buffPower': return `${p}自分のクリーチャー1体のパワーを+${effect.value}する(このターン中)。`;
    case 'tapCreature':    return `${p}相手のクリーチャー1体をタップする。`;
    case 'massDestroyLE': return `${p}パワー${effect.value}以下の相手クリーチャーをすべて破壊する。`;
    case 'destroyAny':    return `${p}相手のクリーチャー1体を破壊する(パワー制限なし)。`;
    case 'multiRamp':     return `${p}山札の上から${effect.count}枚をマナゾーンに置く。`;
    case 'multiAddShield':return `${p}山札の上から${effect.count}枚をシールドゾーンに置く。`;
    case 'massBounce':    return `${p}相手のクリーチャーをすべて手札に戻す。`;
    case 'discardCard':   return `${p}相手は手札を1枚ランダムで捨てる。`;
    default: return '';
  }
}

RAW_CARDS.forEach(c => {
  c.text = c.type === 'creature' ? (c.etb ? effectText(c.etb, true) : '') : effectText(c.effect, false);
  if (!c.abilities) c.abilities = [];
});

function getCardDef(id) { return RAW_CARDS.find(c => c.id === id); }

let _uid = 1;
function makeInstance(defId) { return { uid: 'c' + (_uid++), defId }; }
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function buildDeck() { return shuffle(RAW_CARDS.map(c => makeInstance(c.id))); }

function createPlayer(name, deckIds) {
  const deck = deckIds ? shuffle(deckIds.map(id => makeInstance(id))) : buildDeck();
  return { name, deck, hand: [], mana: [], battle: [], shields: [], graveyard: [], charged: false };
}

function other(idx) { return idx === 0 ? 1 : 0; }
function log(state, msg) { state.log.push(msg); if (state.log.length > 300) state.log.shift(); }
function findInZone(zone, uid) { return zone.find(c => c.uid === uid); }
function removeFromZone(zone, uid) { const i = zone.findIndex(c => c.uid === uid); return i === -1 ? null : zone.splice(i, 1)[0]; }
function removeFromHand(p, uid) { return removeFromZone(p.hand, uid); }
function effectivePower(c) { return getCardDef(c.defId).power + (c.buff || 0); }

function createGame(name1, name2, deckIds1, deckIds2) {
  const state = {
    turnCount: 1, active: 0,
    players: [createPlayer(name1 || 'プレイヤー1', deckIds1), createPlayer(name2 || 'プレイヤー2', deckIds2)],
    log: [], pending: null, winner: null,
  };
  state.players.forEach(p => {
    for (let i = 0; i < 5; i++) p.shields.push(p.deck.shift());
    for (let i = 0; i < 5; i++) p.hand.push(p.deck.shift());
  });
  log(state, `ゲーム開始!`);
  startTurn(state);
  return state;
}

function drawCards(state, playerIdx, n) {
  const p = state.players[playerIdx];
  for (let i = 0; i < n; i++) {
    if (state.winner !== null) return;
    if (p.deck.length === 0) {
      state.winner = other(playerIdx);
      log(state, `${p.name} は山札が尽きて敗北した!`);
      return;
    }
    p.hand.push(p.deck.shift());
  }
}

function startTurn(state) {
  const p = state.players[state.active];
  p.mana.forEach(m => m.tapped = false);
  p.battle.forEach(c => { c.tapped = false; c.sick = false; });
  p.charged = false;
  log(state, `--- ターン${state.turnCount}: ${p.name} ---`);
  if (state.turnCount === 1) {
    log(state, `先攻1ターン目はドローをスキップします。`);
  } else {
    drawCards(state, state.active, 1);
  }
}

function endTurn(state) {
  if (state.winner !== null || state.pending) return { ok: false };
  const p = state.players[state.active];
  p.battle.forEach(c => { c.buff = 0; });
  state.active = other(state.active);
  state.turnCount++;
  startTurn(state);
  return { ok: true };
}

function chargeMana(state, cardUid) {
  if (state.winner !== null || state.pending) return { ok: false };
  const p = state.players[state.active];
  if (p.charged) return { ok: false, reason: 'already-charged' };
  const card = removeFromHand(p, cardUid);
  if (!card) return { ok: false, reason: 'not-in-hand' };
  card.tapped = false;
  p.mana.push(card);
  p.charged = true;
  log(state, `${p.name} が「${getCardDef(card.defId).name}」をマナゾーンに置いた。`);
  return { ok: true };
}

function canPay(p, def) {
  const untapped = p.mana.filter(m => !m.tapped);
  if (untapped.length < def.cost) return false;
  return untapped.some(m => getCardDef(m.defId).civ === def.civ);
}
function payMana(p, def) {
  const untapped = p.mana.filter(m => !m.tapped);
  const civMana = untapped.find(m => getCardDef(m.defId).civ === def.civ);
  civMana.tapped = true;
  let remaining = def.cost - 1;
  for (const m of untapped) {
    if (remaining <= 0) break;
    if (m.tapped) continue;
    m.tapped = true;
    remaining--;
  }
}

function playCard(state, cardUid) {
  if (state.winner !== null || state.pending) return { ok: false };
  const p = state.players[state.active];
  const handCard = p.hand.find(c => c.uid === cardUid);
  if (!handCard) return { ok: false, reason: 'not-in-hand' };
  const def = getCardDef(handCard.defId);
  if (!canPay(p, def)) return { ok: false, reason: 'cannot-pay' };

  removeFromHand(p, cardUid);
  payMana(p, def);

  if (def.type === 'creature') {
    const inst = { uid: handCard.uid, defId: handCard.defId, tapped: false, sick: !def.abilities.includes('speed'), buff: 0 };
    p.battle.push(inst);
    log(state, `${p.name} が「${def.name}」を召喚した。`);
    if (def.etb) triggerEffect(state, state.active, def.etb);
  } else {
    p.graveyard.push(handCard);
    log(state, `${p.name} が「${def.name}」を使用した。`);
    triggerEffect(state, state.active, def.effect);
  }
  return { ok: true };
}

function triggerEffect(state, controllerIdx, effect) {
  const controller = state.players[controllerIdx];
  const opp = state.players[other(controllerIdx)];
  switch (effect.type) {
    case 'draw':
      drawCards(state, controllerIdx, effect.value);
      if (state.winner === null) log(state, `${controller.name} がカードを${effect.value}枚引いた。`);
      return;
    case 'ramp': {
      if (controller.deck.length === 0) { log(state, `(山札がなく何も起きなかった)`); return; }
      const c = controller.deck.shift();
      c.tapped = false;
      controller.mana.push(c);
      log(state, `${controller.name} の山札の上から1枚がマナゾーンに置かれた。`);
      return;
    }
    case 'addShield': {
      if (controller.deck.length === 0) { log(state, `(山札がなく何も起きなかった)`); return; }
      controller.shields.push(controller.deck.shift());
      log(state, `${controller.name} のシールドが1つ増えた。`);
      return;
    }
    case 'regrow': {
      const options = controller.graveyard.filter(c => getCardDef(c.defId).type === 'creature');
      if (options.length === 0) { log(state, `(墓地に対象がなく何も起きなかった)`); return; }
      if (options.length === 1) resolveRegrow(state, controllerIdx, options[0].uid);
      else state.pending = { type: 'chooseTarget', kind: 'regrow', controllerIdx, options: options.map(c => c.uid) };
      return;
    }
    case 'bounce': {
      const targets = opp.battle.slice();
      if (targets.length === 0) { log(state, `(対象がなく何も起きなかった)`); return; }
      if (targets.length === 1) resolveBounce(state, controllerIdx, targets[0].uid);
      else state.pending = { type: 'chooseTarget', kind: 'bounce', controllerIdx, options: targets.map(c => c.uid) };
      return;
    }
    case 'destroyPowerLE': {
      const targets = opp.battle.filter(c => effectivePower(c) <= effect.value);
      if (targets.length === 0) { log(state, `(対象がなく何も起きなかった)`); return; }
      if (targets.length === 1) resolveDestroy(state, controllerIdx, targets[0].uid);
      else state.pending = { type: 'chooseTarget', kind: 'destroy', controllerIdx, options: targets.map(c => c.uid) };
      return;
    }
    case 'tapCreature': {
      const targets = opp.battle.filter(c => !c.tapped);
      if (targets.length === 0) { log(state, `(対象がなく何も起きなかった)`); return; }
      if (targets.length === 1) resolveTap(state, controllerIdx, targets[0].uid);
      else state.pending = { type: 'chooseTarget', kind: 'tap', controllerIdx, options: targets.map(c => c.uid) };
      return;
    }
    case 'massDestroyLE': {
      const toKill = opp.battle.filter(c => effectivePower(c) <= effect.value);
      if (toKill.length === 0) { log(state, `(対象がなく何も起きなかった)`); return; }
      [...toKill].forEach(c => { removeFromZone(opp.battle, c.uid); opp.graveyard.push({ uid: c.uid, defId: c.defId }); });
      log(state, `${controller.name} がパワー${effect.value}以下のクリーチャーをすべて破壊した！`);
      return;
    }
    case 'destroyAny': {
      const targets = opp.battle.slice();
      if (targets.length === 0) { log(state, `(対象がなく何も起きなかった)`); return; }
      if (targets.length === 1) resolveDestroy(state, controllerIdx, targets[0].uid);
      else state.pending = { type: 'chooseTarget', kind: 'destroyAny', controllerIdx, options: targets.map(c => c.uid) };
      return;
    }
    case 'multiRamp': {
      const cnt = effect.count || 2;
      let added = 0;
      for (let i = 0; i < cnt && controller.deck.length > 0; i++) {
        const c = controller.deck.shift(); c.tapped = false; controller.mana.push(c); added++;
      }
      if (added > 0) log(state, `${controller.name} の山札の上から${added}枚がマナゾーンに置かれた。`);
      return;
    }
    case 'multiAddShield': {
      const cnt = effect.count || 2;
      let added = 0;
      for (let i = 0; i < cnt && controller.deck.length > 0; i++) {
        controller.shields.push(controller.deck.shift()); added++;
      }
      if (added > 0) log(state, `${controller.name} のシールドが${added}つ増えた。`);
      return;
    }
    case 'massBounce': {
      const toReturn = opp.battle.splice(0);
      if (toReturn.length === 0) { log(state, `(対象がなく何も起きなかった)`); return; }
      toReturn.forEach(c => opp.hand.push(c));
      log(state, `相手のクリーチャーがすべて手札に戻された！`);
      return;
    }
    case 'discardCard': {
      if (opp.hand.length === 0) { log(state, `(対象がなく何も起きなかった)`); return; }
      const idx = Math.floor(Math.random() * opp.hand.length);
      const disc = opp.hand.splice(idx, 1)[0];
      opp.graveyard.push(disc);
      log(state, `${opp.name} が「${getCardDef(disc.defId).name}」を捨てた。`);
      return;
    }
    case 'buffPower': {
      const targets = controller.battle.slice();
      if (targets.length === 0) { log(state, `(対象がなく何も起きなかった)`); return; }
      if (targets.length === 1) resolveBuff(state, controllerIdx, targets[0].uid, effect.value);
      else state.pending = { type: 'chooseTarget', kind: 'buff', controllerIdx, value: effect.value, options: targets.map(c => c.uid) };
      return;
    }
  }
}

function resolveRegrow(state, controllerIdx, uid) {
  const controller = state.players[controllerIdx];
  const card = removeFromZone(controller.graveyard, uid);
  controller.hand.push(card);
  log(state, `${controller.name} が墓地から「${getCardDef(card.defId).name}」を手札に戻した。`);
}
function resolveBounce(state, controllerIdx, uid) {
  const opp = state.players[other(controllerIdx)];
  const card = removeFromZone(opp.battle, uid);
  opp.hand.push(card);
  log(state, `「${getCardDef(card.defId).name}」が手札に戻された。`);
}
function resolveDestroy(state, controllerIdx, uid) {
  const opp = state.players[other(controllerIdx)];
  const card = removeFromZone(opp.battle, uid);
  opp.graveyard.push(card);
  log(state, `「${getCardDef(card.defId).name}」が破壊された。`);
}
function resolveTap(state, controllerIdx, uid) {
  const opp = state.players[other(controllerIdx)];
  const c = findInZone(opp.battle, uid);
  if (c) { c.tapped = true; log(state, `「${getCardDef(c.defId).name}」がタップされた。`); }
}
function resolveBuff(state, controllerIdx, uid, value) {
  const controller = state.players[controllerIdx];
  const c = findInZone(controller.battle, uid);
  if (c) { c.buff = (c.buff || 0) + value; log(state, `「${getCardDef(c.defId).name}」のパワーが+${value}された。`); }
}
function resolvePendingTarget(state, chosenUid) {
  if (state.winner !== null || !state.pending || state.pending.type !== 'chooseTarget') return { ok: false };
  const { kind, controllerIdx, value } = state.pending;
  state.pending = null;
  if (kind === 'regrow') resolveRegrow(state, controllerIdx, chosenUid);
  else if (kind === 'bounce') resolveBounce(state, controllerIdx, chosenUid);
  else if (kind === 'destroy') resolveDestroy(state, controllerIdx, chosenUid);
  else if (kind === 'tap') resolveTap(state, controllerIdx, chosenUid);
  else if (kind === 'buff')       resolveBuff(state, controllerIdx, chosenUid, value);
  else if (kind === 'destroyAny') resolveDestroy(state, controllerIdx, chosenUid);
  return { ok: true };
}

function eligibleAttackers(state) {
  const p = state.players[state.active];
  return p.battle.filter(c => !c.tapped && !c.sick);
}

function declareAttack(state, attackerUid, targetType, targetUid) {
  if (state.winner !== null || state.pending) return { ok: false };
  const p = state.players[state.active];
  const opp = state.players[other(state.active)];
  const attacker = p.battle.find(c => c.uid === attackerUid);
  if (!attacker || attacker.tapped || attacker.sick) return { ok: false, reason: 'invalid-attacker' };
  if (targetType === 'creature' && !opp.battle.find(c => c.uid === targetUid)) return { ok: false, reason: 'invalid-target' };

  attacker.tapped = true;
  log(state, `${p.name} の「${getCardDef(attacker.defId).name}」が攻撃!`);
  const blockers = opp.battle.filter(c => !c.tapped && getCardDef(c.defId).abilities.includes('guard') && c.uid !== targetUid);
  if (blockers.length > 0) {
    state.pending = {
      type: 'block', attackerUid, targetType, targetUid,
      attackerIdx: state.active, defenderIdx: other(state.active),
      options: blockers.map(c => c.uid),
    };
    log(state, `${opp.name} はブロックを選べます。`);
    return { ok: true, pending: true };
  }
  resolveCombat(state, attacker, targetType, targetUid, null);
  return { ok: true };
}

function resolveBlock(state, blockerUid) {
  if (state.winner !== null || !state.pending || state.pending.type !== 'block') return { ok: false };
  const { attackerUid, targetType, targetUid, attackerIdx, defenderIdx } = state.pending;
  state.pending = null;
  const attacker = state.players[attackerIdx].battle.find(c => c.uid === attackerUid);
  if (!attacker) return { ok: true };
  if (blockerUid) {
    const blocker = state.players[defenderIdx].battle.find(c => c.uid === blockerUid);
    if (blocker) blocker.tapped = true;
  }
  resolveCombat(state, attacker, targetType, targetUid, blockerUid || null);
  return { ok: true };
}

function resolveCombat(state, attacker, targetType, targetUid, blockerUid) {
  const atkIdx = state.active, defIdx = other(state.active);
  const atkP = state.players[atkIdx], defP = state.players[defIdx];
  const attackerDef = getCardDef(attacker.defId);

  if (blockerUid) {
    const blocker = defP.battle.find(c => c.uid === blockerUid);
    log(state, `「${attackerDef.name}」は「${getCardDef(blocker.defId).name}」のブロックを受けた。`);
    fight(state, atkIdx, attacker, defIdx, blocker);
    return;
  }
  if (targetType === 'creature') {
    const target = defP.battle.find(c => c.uid === targetUid);
    if (target) fight(state, atkIdx, attacker, defIdx, target);
    return;
  }
  breakShields(state, defIdx, atkIdx, attackerDef.abilities.includes('multiBreak') ? 2 : 1);
}

function fight(state, atkIdx, attacker, defIdx, defender) {
  const atkP = state.players[atkIdx], defP = state.players[defIdx];
  const aPow = effectivePower(attacker), dPow = effectivePower(defender);
  const aDef = getCardDef(attacker.defId), dDef = getCardDef(defender.defId);
  const atkDT = aDef.abilities.includes('deathtouch');
  const defDT = dDef.abilities.includes('deathtouch');
  const killDef = aPow >= dPow || atkDT;
  const killAtk = dPow >= aPow || defDT;
  if (killDef) {
    removeFromZone(defP.battle, defender.uid);
    defP.graveyard.push({ uid: defender.uid, defId: defender.defId });
  }
  if (killAtk) {
    removeFromZone(atkP.battle, attacker.uid);
    atkP.graveyard.push({ uid: attacker.uid, defId: attacker.defId });
  }
  if (killDef && killAtk) log(state, `「${aDef.name}」と「${dDef.name}」は相打ちで両方破壊された。`);
  else if (killDef)        log(state, `「${aDef.name}」(${aPow}${atkDT?'+毒針':''}) が「${dDef.name}」(${dPow}) を破壊した。`);
  else                     log(state, `「${dDef.name}」(${dPow}${defDT?'+毒針':''}) が「${aDef.name}」(${aPow}) を破壊した。`);
}

function breakShields(state, defIdx, atkIdx, count) {
  const defP = state.players[defIdx];
  if (defP.shields.length === 0) {
    state.winner = atkIdx;
    log(state, `${defP.name} はシールドが無い状態で攻撃を受け、敗北した!`);
    return;
  }
  doBreak(state, defIdx, atkIdx, count);
}
function doBreak(state, defIdx, atkIdx, remaining) {
  const defP = state.players[defIdx];
  if (remaining <= 0 || defP.shields.length === 0) return;
  const shield = defP.shields.shift();
  const sdef = getCardDef(shield.defId);
  defP.hand.push(shield);
  log(state, `${defP.name} のシールドブレイク: 「${sdef.name}」が手札に加わった。`);
  if (sdef.abilities.includes('ambush')) {
    state.pending = { type: 'ambush', controllerIdx: defIdx, cardUid: shield.uid, remaining: remaining - 1, defIdx, atkIdx };
    return;
  }
  doBreak(state, defIdx, atkIdx, remaining - 1);
}

function resolveAmbush(state, choice) {
  if (state.winner !== null || !state.pending || state.pending.type !== 'ambush') return { ok: false };
  const { controllerIdx, cardUid, remaining, defIdx, atkIdx } = state.pending;
  state.pending = null;
  const p = state.players[controllerIdx];
  if (choice === 'play') {
    const card = removeFromHand(p, cardUid);
    const def = getCardDef(card.defId);
    if (def.type === 'creature') {
      const inst = { uid: card.uid, defId: card.defId, tapped: false, sick: !def.abilities.includes('speed'), buff: 0 };
      p.battle.push(inst);
      log(state, `${p.name} が奇襲で「${def.name}」を無料でプレイした!`);
      if (def.etb) triggerEffect(state, controllerIdx, def.etb);
    } else {
      p.graveyard.push(card);
      log(state, `${p.name} が奇襲で「${def.name}」を無料で使用した!`);
      triggerEffect(state, controllerIdx, def.effect);
    }
  } else {
    log(state, `${p.name} はそのまま手札に加えた。`);
  }
  if (!state.pending && state.winner === null) doBreak(state, defIdx, atkIdx, remaining);
  return { ok: true };
}

let peer = null;      // PeerJS Peer
let conn = null;      // DataConnection

const ui = {
  screen: 'start',   // 'start'|'creatingRoom'|'waitingForPeer'|'enterCode'|'connecting'|'connError'|'deckBuilder'|'waitingForReady'|'play'|'gameover'|'disconnected'
  role: null, myIdx: null,
  selectedAttackerUid: null, modal: null, graveyardView: null,

};

function getPlayer(idx) { return game.players[idx]; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── Deck helpers ── */
function deckCount(id){ return deckInProgress.filter(x=>x===id).length; }
function deckAdd(id)  { if(deckCount(id)<4&&deckInProgress.length<60) deckInProgress.push(id); }
function deckRemove(id){ const i=deckInProgress.lastIndexOf(id); if(i!==-1) deckInProgress.splice(i,1); }
function saveDeck(n,d){ try{const s=JSON.parse(localStorage.getItem('five-crest-decks')||'{}');s[n]=d;localStorage.setItem('five-crest-decks',JSON.stringify(s));return true;}catch{return false;} }
function loadSavedDecks(){ try{return JSON.parse(localStorage.getItem('five-crest-decks')||'{}');}catch{return {};} }

/* ── Turn logic ── */
function isMyDecision(){
  if(!game||game.winner!==null) return false;
  if(!game.pending) return game.active===ui.myIdx;
  const p=game.pending;
  if(p.type==='block')        return p.defenderIdx===ui.myIdx;
  if(p.type==='ambush')       return p.controllerIdx===ui.myIdx;
  if(p.type==='chooseTarget') return p.controllerIdx===ui.myIdx;
  return false;
}

/* ── Engine ── */
function applyAction(msg){
  if(!game) return;
  const k=msg.kind;
  if     (k==='chargeMana')    chargeMana(game,msg.uid);
  else if(k==='playCard')      playCard(game,msg.uid);
  else if(k==='attackPlayer')  declareAttack(game,msg.attackerUid,'player',null);
  else if(k==='attackCreature') declareAttack(game,msg.attackerUid,'creature',msg.targetUid);
  else if(k==='blockChoose')   resolveBlock(game,msg.blockerUid);
  else if(k==='blockDecline')  resolveBlock(game,null);
  else if(k==='ambushPlay')    resolveAmbush(game,'play');
  else if(k==='ambushKeep')    resolveAmbush(game,'keep');
  else if(k==='targetChoose')  resolvePendingTarget(game,msg.uid);
  else if(k==='endTurn')       endTurn(game);
}
function sendToPeer(data){ if(conn&&conn.open) conn.send(data); }
function broadcastState(){ if(ui.role==='host'&&game) sendToPeer({type:'STATE',game:JSON.stringify(game)}); }
function afterEngineAction(){ broadcastState(); if(game.winner!==null) ui.screen='gameover'; render(); }
function dispatchAction(msg){
  ui.modal=null; ui.graveyardView=null; ui.selectedAttackerUid=null;
  if(ui.role==='host'){ applyAction(msg); afterEngineAction(); }
  else{ sendToPeer({type:'ACTION',...msg}); render(); }
}

/* ── Peer data handler ── */
function handlePeerData(data){
  if(ui.role==='host'){
    if(data.type==='DECK_READY'){
      guestDeckIds=data.deck; guestPlayerName=data.name||'プレイヤー2';
      if(hostDeckIds){ game=createGame(playerName,guestPlayerName,hostDeckIds,guestDeckIds); ui.screen='play'; broadcastState(); render(); }
    } else if(data.type==='ACTION'){ applyAction(data); afterEngineAction(); }
  } else {
    if(data.type==='STATE'){
      game=JSON.parse(data.game);
      ui.screen=game.winner!==null?'gameover':'play';
      ui.selectedAttackerUid=null; ui.modal=null; ui.graveyardView=null; render();
    } else if(data.type==='RESTART'){
      hostDeckIds=null; guestDeckIds=null;
      deckInProgress=[]; deckFilter='all'; deckSearch=''; ui.deckView='pool';
      ui.screen='deckBuilder'; render();
    }
  }
}

/* ── PeerJS setup ── */
function genCode(){
  const ch='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6},()=>ch[Math.floor(Math.random()*ch.length)]).join('');
}
function destroyPeer(){ if(peer){try{peer.destroy();}catch(e){} peer=null; conn=null;} }
function attachConn(c){
  conn=c;
  c.on('data',handlePeerData);
  c.on('close',()=>{ if(ui.screen!=='start'){ui.screen='disconnected';render();} });
  c.on('error',e=>console.warn('conn err',e));
}
function createRoom(){
  ui.role='host'; ui.myIdx=0; playerName='プレイヤー1';
  roomCode=genCode(); ui.screen='creatingRoom'; render();
  destroyPeer();
  peer=new Peer('five-crest-'+roomCode.toLowerCase());
  peer.on('open',()=>{ ui.screen='waitingForPeer'; render(); });
  peer.on('connection',c=>{
    attachConn(c);
    c.on('open',()=>{
      hostDeckIds=null; guestDeckIds=null;
      deckInProgress=[]; deckFilter='all'; deckSearch=''; ui.deckView='pool';
      ui.screen='deckBuilder'; render();
    });
  });
  peer.on('error',err=>{
    if(err.type==='unavailable-id'){ roomCode=genCode(); createRoom(); return; }
    ui.screen='connError'; render();
  });
}
function joinRoom(code){
  ui.role='guest'; ui.myIdx=1; playerName='プレイヤー2';
  ui.screen='connecting'; render();
  destroyPeer();
  peer=new Peer();
  peer.on('open',()=>{
    const c=peer.connect('five-crest-'+code.trim().toLowerCase(),{reliable:true,serialization:'json'});
    attachConn(c);
    c.on('open',()=>{
      hostDeckIds=null; guestDeckIds=null;
      deckInProgress=[]; deckFilter='all'; deckSearch=''; ui.deckView='pool';
      ui.screen='deckBuilder'; render();
    });
  });
  peer.on('error',()=>{ ui.screen='connError'; render(); });
  setTimeout(()=>{ if(ui.screen==='connecting'){ui.screen='connError';render();} },14000);
}

  const civFilters=['all',...civOrder].map(k=>{const label=k==='all'?'すべて':CIVS[k].name;const color=k!=='all'?CIVS[k].color:'#777';const active=deckFilter===k;return `<button class="flt-btn${active?' active':''}" data-action="db-filter" data-civ="${k}" style="${active?`--fc:${color}`:''}">${label}</button>`;}).join('');
  const saved=loadSavedDecks(),savedOpts=Object.keys(saved).map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('');
  const poolHidden=ui.deckView==='list'?'db-hidden':'';

  const connStatus = conn&&conn.open ? `<div class="conn-pill"><div class="conn-dot ok"></div>接続中</div>` : `<div class="conn-pill"><div class="conn-dot wait"></div>待機中</div>`;
  return `<div class="db-screen">

    </div>

      <div class="db-filters">${civFilters}</div>
      <div class="db-search-row">
        <input class="db-srch" id="dbSrch" type="text" placeholder="カード名検索..." value="${esc(deckSearch)}">

          <button class="btn btn-ghost btn-sm" data-action="db-load">読み込み</button>
        </div>

    <div class="db-tabs">
      <button class="db-tab${ui.deckView==='pool'?' active':''}" data-action="db-view" data-view="pool">カードプール</button>

      <div class="db-pool ${poolHidden}" id="dbPool">${poolHTML}</div>

}

function manaRowHTML(p){

  return `<div class="mana-row">${p.mana.map(m=>{const def=getCardDef(m.defId),civ=CIVS[def.civ];return `<div class="mana-chip ${m.tapped?'tapped':''}" style="--mc:${civ.color}" title="${esc(def.name)}">${civ.enName[0]}</div>`;}).join('')}</div>`;
}
function shieldPipsHTML(p){let s='';for(let i=0;i<5;i++)s+=`<span class="shield-pip ${i<p.shields.length?'':'empty'}"></span>`;const e=p.shields.length>5?`<span style="font-size:10px;margin-left:2px;">+${p.shields.length-5}</span>`:'';return `<span class="shield-pips">${s}</span>${e}`;}
function playerHeaderHTML(idx,showDot){const p=getPlayer(idx);return `<div class="player-header"><div class="player-name-block"><span class="player-name">${showDot?'<span class="turn-dot"></span>':''}${esc(p.name)}</span></div><div class="meta-pips">${shieldPipsHTML(p)}<span class="deck-count" title="山札 残り${p.deck.length}枚">${ICON_DECK}${p.deck.length}</span><span class="gy-count" data-action="view-graveyard" data-owner="${idx}" title="墓地">${ICON_GY}${p.graveyard.length}</span></div></div>`;}
function battleZoneHTML(idx){
  const p=getPlayer(idx),isMyZone=idx===ui.myIdx,canAct=isMyDecision(),tgt=!!ui.selectedAttackerUid;
  if(!p.battle.length)return `<div class="battle-zone"><span class="empty-zone-hint">バトルゾーンは空です</span></div>`;
  return `<div class="battle-zone">${p.battle.map(c=>{
    const opts={tapped:c.tapped,sick:c.sick,buff:c.buff};
    if(tgt&&canAct&&!isMyZone){opts.selectable=true;opts.validTarget=true;opts.action='attack-creature';opts.uid=c.uid;}
    else if(tgt&&canAct&&isMyZone){if(c.uid===ui.selectedAttackerUid){opts.selectable=true;opts.selected=true;opts.action='cancel-attack';}else if(!c.tapped&&!c.sick){opts.selectable=true;opts.action='select-attacker';opts.uid=c.uid;}else{opts.selectable=true;opts.action='view-card';opts.uid=c.uid;}}
    else if(!tgt&&canAct&&isMyZone&&!c.tapped&&!c.sick){opts.selectable=true;opts.action='select-attacker';opts.uid=c.uid;}
    else{opts.selectable=true;opts.action='view-card';opts.uid=c.uid;}

function handRowHTML(idx){
  const p=getPlayer(idx),isMyHand=idx===ui.myIdx,canAct=isMyDecision(),tgt=!!ui.selectedAttackerUid;
  if(!p.hand.length)return `<div class="hand-row"><span class="empty-zone-hint">手札なし</span></div>`;
  if(!isMyHand)return `<div class="hand-row">${p.hand.map(()=>cardBackHTML(false)).join('')}</div>`;
  return `<div class="hand-row">${p.hand.map(c=>{const opts=(canAct&&!tgt)?{selectable:true,action:'open-hand-card',uid:c.uid}:{};return cardHTML(c.defId,opts);}).join('')}</div>`;

function opponentRowHTML(){const oi=other(ui.myIdx),p=getPlayer(oi),tgt=!!ui.selectedAttackerUid&&isMyDecision();return `<div class="player-row opponent">${playerHeaderHTML(oi,game.active===oi)}${tgt?`<div class="target-face valid-target" data-action="attack-player">${esc(p.name)} を直接攻撃 ⟶</div>`:''}${manaRowHTML(p)}${battleZoneHTML(oi)}${handRowHTML(oi)}</div>`;}
function myRowHTML(){const p=getPlayer(ui.myIdx);return `<div class="player-row mine">${battleZoneHTML(ui.myIdx)}${manaRowHTML(p)}${handRowHTML(ui.myIdx)}${playerHeaderHTML(ui.myIdx,game.active===ui.myIdx)}</div>`;}
function centerStripHTML(){

function pendingModalHTML(){
  if(!game.pending)return '';
  const pend=game.pending;
  const mine=(pend.type==='block'&&pend.defenderIdx===ui.myIdx)||((pend.type==='ambush'||pend.type==='chooseTarget')&&pend.controllerIdx===ui.myIdx);
  if(!mine){const msgs={block:'ブロック選択中...',ambush:'奇襲選択中...',chooseTarget:'対象選択中...'};return `<div class="modal-overlay" style="pointer-events:none;"><div class="modal-box" style="text-align:center;pointer-events:none;max-width:260px;"><div class="waiting-banner" style="font-size:13px;padding:14px;">${msgs[pend.type]||'選択中...'}</div></div></div>`;}
  if(pend.type==='block'){const def=getPlayer(pend.defenderIdx),atk=getPlayer(pend.attackerIdx).battle.find(c=>c.uid===pend.attackerUid),aDef=atk?getCardDef(atk.defId):null;const opts=pend.options.map(uid=>{const c=def.battle.find(x=>x.uid===uid);return cardHTML(c.defId,{action:'block-choose',uid,selectable:true});}).join('');return `<div class="modal-overlay"><div class="modal-box"><div class="modal-title">${esc(def.name)}: ブロックしますか?</div><div style="text-align:center;font-size:12.5px;color:var(--text-muted);">「${esc(aDef?aDef.name:'')}」の攻撃</div><div class="target-grid">${opts}</div><div class="modal-actions"><button class="btn btn-ghost btn-block" data-action="block-decline">ブロックしない</button></div></div></div>`;}
  if(pend.type==='ambush'){const p=getPlayer(pend.controllerIdx),hc=p.hand.find(c=>c.uid===pend.cardUid);if(!hc)return '';const card=getCardDef(hc.defId);return `<div class="modal-overlay"><div class="modal-box"><div class="modal-title">奇襲発動!</div><div class="modal-card-preview">${cardHTML(card.id,{large:true})}</div><div style="text-align:center;font-size:12.5px;color:var(--text-muted);">無料でプレイしますか?</div><div class="modal-actions row"><button class="btn btn-ghost" data-action="ambush-keep">手札に加える</button><button class="btn btn-primary" data-action="ambush-play">無料でプレイ</button></div></div></div>`;}
  if(pend.type==='chooseTarget'){const labels={regrow:'墓地から戻すクリーチャーを選択',bounce:'手札に戻すクリーチャーを選択',destroy:'破壊するクリーチャーを選択',destroyAny:'破壊するクリーチャーを選択',tap:'タップするクリーチャーを選択',buff:'パワーを上げるクリーチャーを選択'};const zone=pend.kind==='regrow'?getPlayer(pend.controllerIdx).graveyard:pend.kind==='buff'?getPlayer(pend.controllerIdx).battle:getPlayer(other(pend.controllerIdx)).battle;const opts=pend.options.map(uid=>{const c=zone.find(x=>x.uid===uid);return cardHTML(c.defId,{action:'target-choose',uid,selectable:true});}).join('');return `<div class="modal-overlay"><div class="modal-box"><div class="modal-title">${esc(labels[pend.kind]||'対象を選択')}</div><div class="target-grid">${opts}</div></div></div>`;}
  return '';
}
function cardModalHTML(){
  if(!ui.modal)return '';const{kind,uid}=ui.modal;
  let card=null;for(let pi=0;pi<2;pi++){const p=game.players[pi];for(const zn of['hand','battle','mana','graveyard']){const f=p[zn].find(c=>c.uid===uid);if(f)card=f;}}
  if(!card)return '';const def=getCardDef(card.defId);

function render(){
  const app=document.getElementById('app');
  let html;
  if     (ui.screen==='start')           html=startScreenHTML();
  else if(ui.screen==='creatingRoom')    html=creatingRoomHTML();
  else if(ui.screen==='waitingForPeer')  html=waitingForPeerHTML();
  else if(ui.screen==='enterCode')       html=enterCodeHTML();
  else if(ui.screen==='connecting')      html=connectingHTML();
  else if(ui.screen==='connError')       html=connErrorHTML();
  else if(ui.screen==='disconnected')    html=disconnectedHTML();
  else if(ui.screen==='deckBuilder')     html=deckBuilderScreenHTML();
  else if(ui.screen==='waitingForReady') html=waitingForReadyHTML();
  else if(ui.screen==='gameover')        html=gameOverScreenHTML();
  else{
    html=renderBoard();
    html+=pendingModalHTML();
    if(!game.pending){html+=cardModalHTML();html+=graveyardModalHTML();}
  }
  app.innerHTML=html;
  const feed=document.getElementById('logFeed');
  if(feed)feed.scrollTop=feed.scrollHeight;
  if(ui.screen==='deckBuilder'){
    const srch=document.getElementById('dbSrch');
    if(srch){
      srch.addEventListener('input',e=>{
        deckSearch=e.target.value;
        const q=e.target.value.toLowerCase();
        document.querySelectorAll('.pool-wrap').forEach(el=>{el.style.display=(el.dataset.name||'').toLowerCase().includes(q)?'':'none';});
      });
    }
    // focus code input
    const ci=document.getElementById('codeInp');if(ci)ci.focus();
  }
  if(ui.screen==='enterCode'){
    const ci=document.getElementById('codeInp');if(ci){ci.focus();ci.addEventListener('keydown',e=>{if(e.key==='Enter')document.querySelector('[data-action="connect-room"]')?.click();});}
  }
}

/* =====================================================================
   EVENTS
   ===================================================================== */
document.getElementById('app').addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');
  if(!el)return;
  const action=el.dataset.action, uid=el.dataset.uid;

  switch(action){
    /* ── Navigation ── */
    case 'create-room': createRoom(); break;
    case 'show-join':   ui.screen='enterCode'; render(); break;
    case 'connect-room': {
      const code=(document.getElementById('codeInp')?.value||'').trim().toUpperCase();
      if(code.length===6) joinRoom(code);
      else alert('6文字のコードを入力してください。');
      break;
    }
    case 'go-start': destroyPeer(); ui.screen='start'; render(); break;

    /* ── Deck Builder ── */
    case 'db-filter':  deckFilter=el.dataset.civ; render(); break;
    case 'db-view':    ui.deckView=el.dataset.view; render(); break;
    case 'pool-add':   deckAdd(el.dataset.id); render(); break;
    case 'deck-add':   deckAdd(el.dataset.id); render(); break;
    case 'deck-rem':   deckRemove(el.dataset.id); render(); break;
    case 'db-save': {
      const n=document.getElementById('deckNameInp')?.value?.trim()||'マイデッキ';
      saveDeck(`[${ui.role==='host'?'P1':'P2'}] ${n}`,[...deckInProgress]);
      alert(`「${n}」を保存しました。`); render(); break;
    }
    case 'db-load': {
      const sel=document.getElementById('deckLoadSel');const n=sel?.value;
      if(n){const d=loadSavedDecks();if(d[n]){deckInProgress=[...d[n]];render();}} break;
    }
    case 'db-ready': {
      const ne=document.getElementById('nameInp');if(ne)playerName=ne.value.trim()||playerName;
      if(deckInProgress.length<40)break;
      if(ui.role==='host'){
        hostDeckIds=[...deckInProgress];
        if(guestDeckIds){game=createGame(playerName,guestPlayerName,hostDeckIds,guestDeckIds);ui.screen='play';broadcastState();render();}
        else{ui.screen='waitingForReady';render();}
      } else {
        sendToPeer({type:'DECK_READY',deck:[...deckInProgress],name:playerName});
        ui.screen='waitingForReady';render();
      }
      break;
    }
    case 'db-back': ui.screen='deckBuilder'; render(); break;

    /* ── Game UI ── */
    case 'open-hand-card': ui.modal={kind:'hand',uid};ui.graveyardView=null;render();break;
    case 'view-card':      ui.modal={kind:'view',uid};ui.graveyardView=null;render();break;
    case 'close-modal':    ui.modal=null;ui.graveyardView=null;render();break;
    case 'view-graveyard': ui.graveyardView=parseInt(el.dataset.owner,10);ui.modal=null;render();break;
    case 'select-attacker':  ui.selectedAttackerUid=uid;render();break;
    case 'cancel-attack':    ui.selectedAttackerUid=null;render();break;

    /* ── Engine ── */
    case 'charge-mana':  ui.modal=null;dispatchAction({kind:'chargeMana',uid});break;
    case 'play-card':    ui.modal=null;dispatchAction({kind:'playCard',uid});break;
    case 'attack-player':  { const a=ui.selectedAttackerUid;dispatchAction({kind:'attackPlayer',attackerUid:a});break;}
    case 'attack-creature':{ const a=ui.selectedAttackerUid;dispatchAction({kind:'attackCreature',attackerUid:a,targetUid:uid});break;}
    case 'block-choose':  dispatchAction({kind:'blockChoose',blockerUid:uid});break;
    case 'block-decline': dispatchAction({kind:'blockDecline'});break;
    case 'ambush-play':   dispatchAction({kind:'ambushPlay'});break;
    case 'ambush-keep':   dispatchAction({kind:'ambushKeep'});break;
    case 'target-choose': dispatchAction({kind:'targetChoose',uid});break;
    case 'end-turn':      dispatchAction({kind:'endTurn'});break;

    /* ── Post-game ── */
    case 'play-again':
      if(ui.role==='host'){
        hostDeckIds=null;guestDeckIds=null;
        deckInProgress=[];deckFilter='all';deckSearch='';ui.deckView='pool';
        ui.selectedAttackerUid=null;ui.modal=null;ui.graveyardView=null;
        sendToPeer({type:'RESTART'});
        ui.screen='deckBuilder';render();
      }
      break;
  }
});

// Check URL hash for room code (P2 convenience link)
(()=>{
  const hash=window.location.hash.slice(1).toUpperCase();
  if(/^[A-Z2-9]{6}$/.test(hash)){
    ui.screen='enterCode'; render();
    setTimeout(()=>{const ci=document.getElementById('codeInp');if(ci)ci.value=hash;},50);
  } else {
    render();
  }
})();

</script>
</body>
</html>
